# Reusable Java build workflow, shared by every Spring Boot service's caller
# workflow (ci-backend.yml today, any future Java service tomorrow).
#
# Three jobs, only the last one touches AWS:
#   - build-test: compile + unit tests, always.
#   - docker-build-scan: builds the image and scans it with Trivy, always —
#     no AWS credentials needed, so PR/feature builds get real vulnerability
#     signal without any cloud access.
#   - docker-push: only on a push to main, authenticates via OIDC and pushes
#     the already-scanned image to ECR. Uses the deploy OIDC role, gated by
#     the deploy-dev GitHub Environment (branch-restricted to main there).
name: ci-java

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      app-path:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: ${{ inputs.app-path }}/pom.xml

      - name: Build and test
        working-directory: ${{ inputs.app-path }}
        run: mvn -B verify

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-jar
          path: ${{ inputs.app-path }}/target/*.jar
          retention-days: 5

  docker-build-scan:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/docker-build-push
        with:
          service-name: ${{ inputs.service-name }}
          app-path: ${{ inputs.app-path }}
          image-tag: sha-${{ github.sha }}
          push: 'false'

  docker-push:
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: deploy-dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: ./.github/actions/docker-build-push
        with:
          service-name: ${{ inputs.service-name }}
          app-path: ${{ inputs.app-path }}
          image-tag: sha-${{ github.sha }}
          scan: 'false'
          push: 'true'
          environment: dev
